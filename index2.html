<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPIc Script Viewer (Natural)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --accent-color: #ec4899;
            --bg-light: #ffffff;
            --bg-dark: #1f2937;
            --text-light: #111827;
            --text-dark: #f3f4f6;
            --border-light: #e5e7eb;
            --border-dark: #374151;
            --highlight-color: #fef08a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-light);
            transition: background-color 0.3s, color 0.3s;
            height: 100vh;
            overflow: hidden;
        }

        body.dark-mode {
            background-color: var(--bg-dark);
            color: var(--text-dark);
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .global-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-primary:hover {
            background-color: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .btn-primary.active {
            background-color: rgba(255, 255, 255, 0.4);
            border-color: white;
        }

        .speed-control {
            display: flex;
            gap: 0.3rem;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 0.3rem;
            border-radius: 0.5rem;
        }

        .speed-btn {
            padding: 0.5rem 0.8rem;
            background-color: transparent;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 0.3rem;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .speed-btn.active {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .speed-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .theme-toggle {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background-color: var(--bg-light);
            border-right: 1px solid var(--border-light);
            overflow-y: auto;
            transition: background-color 0.3s;
        }

        body.dark-mode .sidebar {
            background-color: #111827;
            border-right-color: var(--border-dark);
        }

        .topic-tab {
            padding: 1.2rem;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.3s ease;
            border-bottom: 1px solid var(--border-light);
        }

        body.dark-mode .topic-tab {
            border-bottom-color: var(--border-dark);
        }

        .topic-tab:hover {
            background-color: #f3f4f6;
        }

        body.dark-mode .topic-tab:hover {
            background-color: #1f2937;
        }

        .topic-tab.active {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.1) 0%, transparent 100%);
            border-left-color: var(--primary-color);
        }

        body.dark-mode .topic-tab.active {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.2) 0%, transparent 100%);
        }

        .topic-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
            color: var(--text-light);
        }

        body.dark-mode .topic-name {
            color: var(--text-dark);
        }

        .topic-subtitle {
            font-size: 0.8rem;
            color: #6b7280;
        }

        body.dark-mode .topic-subtitle {
            color: #9ca3af;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            background-color: var(--bg-light);
            transition: background-color 0.3s;
        }

        body.dark-mode .content {
            background-color: #111827;
        }

        .question-block {
            margin-bottom: 2.5rem;
            background-color: #f9fafb;
            padding: 1.5rem;
            border-radius: 0.8rem;
            border-left: 4px solid var(--primary-color);
            transition: background-color 0.3s;
        }

        body.dark-mode .question-block {
            background-color: #1f2937;
        }

        .badge {
            display: inline-block;
            padding: 0.3rem 0.7rem;
            border-radius: 0.3rem;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-roleplay {
            background-color: #dbeafe;
            color: #1e40af;
        }

        body.dark-mode .badge-roleplay {
            background-color: #1e3a8a;
            color: #93c5fd;
        }

        .badge-sudden {
            background-color: #fed7aa;
            color: #92400e;
        }

        body.dark-mode .badge-sudden {
            background-color: #78350f;
            color: #fdba74;
        }

        .badge-experience {
            background-color: #dcfce7;
            color: #15803d;
        }

        body.dark-mode .badge-experience {
            background-color: #064e3b;
            color: #86efac;
        }

        .badge-general {
            background-color: #e5e7eb;
            color: #374151;
        }

        body.dark-mode .badge-general {
            background-color: #4b5563;
            color: #d1d5db;
        }

        .question {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--text-light);
        }

        body.dark-mode .question {
            color: var(--text-dark);
        }

        .answer-container {
            background-color: var(--bg-light);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            transition: background-color 0.3s;
        }

        body.dark-mode .answer-container {
            background-color: #374151;
        }

        .answer-text {
            line-height: 1.8;
            color: #374151;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        body.dark-mode .answer-text {
            color: #d1d5db;
        }

        .answer-text .highlighted {
            background-color: var(--highlight-color);
            padding: 0.2rem 0.4rem;
            border-radius: 0.2rem;
            font-weight: 600;
        }

        .audio-controls {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .btn-play {
            background-color: var(--primary-color);
            color: white;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-play:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-play:active {
            transform: translateY(0);
        }

        .playback-info {
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 0.5rem;
        }

        body.dark-mode .playback-info {
            color: #9ca3af;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #9ca3af;
            font-size: 1.1rem;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        body.dark-mode ::-webkit-scrollbar-thumb {
            background: #4b5563;
        }

        body.dark-mode ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .main-content {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 200px;
                border-right: none;
                border-bottom: 1px solid var(--border-light);
                display: flex;
                overflow-x: auto;
            }

            body.dark-mode .sidebar {
                border-bottom-color: var(--border-dark);
            }

            .topic-tab {
                flex-shrink: 0;
                border-left: none;
                border-bottom: 4px solid transparent;
                width: auto;
                min-width: 200px;
            }

            .topic-tab.active {
                border-left: none;
                border-bottom-color: var(--primary-color);
            }

            .content {
                padding: 1rem;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header h1 {
                font-size: 1.4rem;
            }

            .global-controls {
                width: 100%;
                justify-content: space-between;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.2rem;
            }

            .btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.85rem;
            }

            .question-block {
                padding: 1rem;
                border-left-width: 3px;
            }

            .question {
                font-size: 1rem;
            }

            .answer-text {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 OPIc Script Viewer (Natural Tone)</h1>
            <div class="global-controls">
                <button class="btn btn-primary" id="playAllBtn">
                    <span>▶</span> Play All
                </button>
                <button class="btn btn-primary" id="stopAllBtn">
                    <span>⏹</span> Stop
                </button>
                <div class="speed-control" id="speedControl">
                    <button class="speed-btn" data-speed="0.7">0.7x</button>
                    <button class="speed-btn" data-speed="0.8">0.8x</button>
                    <button class="speed-btn active" data-speed="0.9">0.9x</button>
                    <button class="speed-btn" data-speed="1.0">1.0x</button>
                    <button class="speed-btn" data-speed="1.1">1.1x</button>
                    <button class="speed-btn" data-speed="1.2">1.2x</button>
                </div>
                <select id="voiceSelector" style="padding:0.5rem;border-radius:0.4rem;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15);color:white;font-size:0.85rem;max-width:200px;cursor:pointer;" title="Select Voice">
                    <option>Loading voices...</option>
                </select>
                <button class="btn theme-toggle" id="themeToggle">🌙</button>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar" id="sidebar"></div>
            <div class="content" id="content"></div>
        </div>
    </div>

    <script>
        // Data structure
        const topics = [
            {
                id: 1,
                korean: "건강",
                english: "Health",
                qa: [
                    {
                        type: "general",
                        q: "Let's talk about a healthy person you know.",
                        a: "So, I have this close friend who's honestly one of the healthiest people I know. She's in her early 40s, and she just looks really fit and energetic all the time. She's not super skinny or anything, but her body is really well-balanced. And her skin? It's so clear and bright — it just makes her look even healthier. I think the reason she's like that is she's got really solid habits. She works out regularly, like three to four times a week at the gym, doing both cardio and weight training. Plus, she eats really well. She's big on home-cooked meals instead of fast food, and she always makes sure she's getting enough vegetables, fruits, and protein. Oh and she's also really good at managing stress. Like, when she's feeling overwhelmed, she'll just go for a walk or put on some music. So yeah, with all those habits, she's always full of energy. I honestly admire that about her."
                    },
                    {
                        type: "general",
                        q: "Tell me about how your parent's generation used to maintain their health. How is it different from your generation?",
                        a: "Honestly, my parents' generation had a totally different approach to health. They didn't really go to the gym or follow some specific workout plan. They just stayed active naturally, you know? Like, they walked everywhere, did a lot of physical work, spent more time outside. And their diet was way different too. They mostly ate home-cooked meals because processed food and fast food just weren't really a thing back then. So their meals were naturally healthier. But for my generation, it's kind of the opposite. A lot of us have desk jobs, so we're sitting all day. That's why we have to exercise on purpose — like going to the gym or doing home workouts. And the food situation is tough too, I mean, we've got fast food and delivery apps everywhere, so it's so easy to eat unhealthy. But at the same time, people are actually more aware of health now. Like, they're into dieting, supplements, specific fitness programs and all that. So basically, my parents' generation stayed healthy without even trying that hard, just through their daily routine. But we really have to make a conscious effort, which is kind of ironic."
                    },
                    {
                        type: "general",
                        q: "What are some things you have tried personally to stay healthy?",
                        a: "Well, I've actually tried a few things to stay healthy. The biggest one is working out regularly. I go to the gym about two to three times a week — mostly cardio like running on the treadmill, and sometimes I'll throw in some light weight training. Honestly, it was pretty hard to stick with at first, but now it's just a habit. I also started cleaning up my eating. I used to eat a ton of fast food and instant meals, but I realized, you know, that stuff's really not good for me. So now I try to cook at home more and make sure I'm getting vegetables, fruits, and protein. Oh and another thing — sleep. I used to stay up way too late just scrolling on my phone, but now I actually try to go to bed at a decent hour and keep a regular schedule. And honestly, since I started doing all this, I feel way more energetic than before. It's made a real difference."
                    }
                ]
            },
            {
                id: 2,
                korean: "영화",
                english: "Movies",
                qa: [
                    {
                        type: "roleplay",
                        q: "[롤플레이] Contact the movie theater and ask three to four questions about getting movie tickets.",
                        a: "Hey, hi! I'm looking to book some movie tickets for tomorrow and I had a few questions. So first off, what's playing right now? Anything you'd recommend? Oh, that sounds pretty good, actually. And do you still have seats open for the 7PM showing? I need two tickets — somewhere in the middle rows if possible. Nice, perfect. Oh and one more thing — I've got a discount coupon, can I use that for these tickets? Awesome, glad to hear that. Oh, by the way, do you guys have parking there? All right, great. That's everything I needed. Thanks a lot!"
                    },
                    {
                        type: "sudden",
                        q: "[돌발] You purchased two movie tickets but there is something wrong. Explain the situation to the staff.",
                        a: "Hey, excuse me. So I just realized I messed up with my tickets. I was trying to book the 7PM showing, but I accidentally got tickets for the 9PM one instead. I must've clicked the wrong time slot and didn't even notice until just now. I'm really sorry about that. Is there any way I could switch them to the 7PM show? Or honestly, if it's easier, I'm totally fine with getting a refund and just buying new ones. I don't mind paying a small fee or whatever — I just really wanna get this sorted out before the movie starts. What are my options here? Oh, that's great to hear. Thanks so much, I really appreciate it."
                    },
                    {
                        type: "experience",
                        q: "[경험] Have you ever had a similar experience? (Wrong tickets for a soccer game)",
                        a: "Oh man, yes, actually something really similar happened to me with a soccer game. So this was last year, I think around September. My friends and I were super excited because we'd gotten tickets to this big rivalry match — our local team against their biggest rivals. So we met up, grabbed some food on the way, got to the stadium early, the whole thing. But then when we tried to scan our tickets at the gate, it just wouldn't go through. I pulled up my email and — I couldn't believe it — I'd bought tickets for the wrong game. Like, I'd selected a match that was happening the following week, not that day. My friends were, you know, pretty annoyed, understandably. But we went to the customer service desk and the person there was actually really helpful. They managed to switch our tickets to the right game, though we had to pay a little extra fee. We ended up getting inside just before kickoff, which was a huge relief. It was stressful in the moment, but honestly we laughed about it afterwards. And the match was totally worth it — our team won! So yeah, ever since then, I triple-check every single detail before I buy tickets. Lesson learned."
                    },
                    {
                        type: "general",
                        q: "Compare movies made today to movies you saw while growing up.",
                        a: "So I'd say movies have changed quite a bit from when I was growing up. Back then, movies were, you know, simpler in a way — they relied a lot more on the story itself. The special effects weren't nearly as advanced, so it was really about the plot and the characters pulling you in. Now though, movies are just visually insane. Like, with CGI and all that technology, especially in action or fantasy films, the visuals are on a whole other level. It's honestly pretty impressive. And the other big thing is how we watch them. I used to only see movies in theaters or catch them on TV. But now, I mean, everyone's just streaming stuff at home, which is way more convenient. But here's the thing — even with all these changes, I think the core of it is still the same. Movies are still about telling good stories and giving people a good time. And people still love watching them together with friends or family. That part hasn't really changed at all."
                    },
                    {
                        type: "general",
                        q: "When you talk about movies with your friends, what topics do you discuss?",
                        a: "So my friend Jenny and I are both really into movies, so we end up talking about them all the time. And it's funny because what we talk about is totally different depending on whether it's before or after we watch something. Like, before watching, we're mostly checking what's popular, looking at reviews, that kind of stuff. I'm the type who thinks if a movie's popular, it's probably good for a reason. And honestly, if the reviews are bad, I'll skip it — I don't wanna waste my time or money on something that's not worth it. But after we watch a movie, that's when it gets really fun. We always start with the best scenes — like some crazy action sequence or a really emotional moment. Then we get into how the actors did, whether the story held up. And especially if there's a plot twist, we'll be like, 'Did you see that coming?' and go back and forth about it. Those conversations are honestly the best part sometimes. It makes you appreciate the movie way more when you actually talk it through with someone."
                    }
                ]
            },
            {
                id: 3,
                korean: "집에서 보내는 휴가",
                english: "Home Vacation",
                qa: [
                    {
                        type: "general",
                        q: "How do most people spend their vacation at home? How does that compare to the past?",
                        a: "So, home vacations have changed a lot, honestly. Back in the day, people kept it really simple. They'd just watch TV, read books, or hang out with family. I mean, there weren't that many options for entertainment, so it was all pretty quiet and chill. But now? Totally different story. People have so many more things to do even without leaving the house. Like, they binge-watch shows on Netflix, play video games, scroll through social media for hours. And the thing is, people actually try to make their time at home feel special now. Some people get into cooking new recipes, do home workouts, or set up their place like a little staycation — you know, candles, good food, the whole vibe. I think technology is the biggest reason for that shift. With smartphones and the internet, you can basically do anything from your couch. Plus, people these days really value their personal time and self-care way more than before. So yeah, home vacations used to be super low-key, but now people actually put effort into making them fun and meaningful."
                    },
                    {
                        type: "general",
                        q: "Tell me about the importance and benefits of going on a vacation.",
                        a: "Honestly, I think vacations are kind of essential, not just a luxury. Like, these days everyone's so busy and stressed out from work and daily life. So just taking a break — even a short one — really helps you relax and recharge. And it's not just about physical rest either. Mentally, it makes a huge difference. When you take time off, you can kind of step away from all your worries for a bit, and you come back feeling so much fresher. Plus, vacations are actually really good for relationships. Like, when you spend quality time with family or friends on a trip, you end up having real conversations and making memories together. That stuff matters. Oh, and there's the whole new experience thing too. You get to try different activities, see new places, maybe even learn something you didn't expect. It just makes life more interesting, you know? So yeah, vacations aren't just about having fun — they keep you healthy, less stressed, and closer to the people you care about."
                    },
                    {
                        type: "general",
                        q: "Who are the people you would like to see and spend time with on your vacation?",
                        a: "So I'm more of a stay-at-home vacation type, and for me it's really about spending time with family and a few close friends. Like, with my family — I'm usually so busy with work that I don't get to see them nearly enough. So when I'm on vacation, we'll have meals together, watch TV, just hang around the house. It sounds boring, I know, but honestly those moments mean a lot to me. And then I like to catch up with a couple of close friends too. But nothing crazy — I'd rather have them come over to my place or I'll go to theirs. We'll order some food, talk for hours about everything and nothing, maybe throw on a movie. It's super low-key but it actually recharges me more than any fancy trip would. I mean, at the end of the day, being around people I'm comfortable with in a relaxed setting — that's my ideal vacation right there."
                    },
                    {
                        type: "general",
                        q: "Describe some of the things you would like to do with people during your vacation.",
                        a: "Well, since I usually stay home for vacation, we keep it pretty simple but it's still really nice. Like with my family, we'll cook together or just order something good and eat at home. Then we'll sit around the table talking about what's been going on in our lives, maybe put on a movie. Nothing fancy at all, but I actually love those moments because it feels so relaxed and, like, connected. With friends, it's super casual too. We might hit up a cafe, go for a walk, or honestly just end up at someone's place doing nothing. Most of the time we're just talking for hours about random stuff — work drama, hobbies, funny things that happened. Oh, and sometimes we'll start a TV series and just binge the whole thing in one sitting. But honestly, I don't think it really matters what we're doing. It's more about who I'm with, you know? As long as I'm around people I feel comfortable with, I'm good."
                    },
                    {
                        type: "general",
                        q: "Tell me about the most memorable vacation you have spent at home.",
                        a: "Oh man, so this was during COVID, a few years back. I couldn't go anywhere obviously, so I just stayed home with my family. And I'm not gonna lie, at first I thought it was gonna be so boring. But it turned out way better than I expected. So at first we just ordered a ton of food and lounged around the house. We watched movies together and actually talked — like really talked — which we never do because everyone's always so busy. And then as the days went on, we started cooking together, taking little walks around the neighborhood, just simple stuff. I also had a close friend come over at one point and we literally just sat there chatting and laughing for hours. By the end of it, I felt genuinely rested and recharged. I think what made it so memorable was just the quality time, you know? No pressure, no plans, just being with people I care about. So yeah, nothing exciting happened, but honestly it's probably one of the most meaningful vacations I've ever had."
                    }
                ]
            },
            {
                id: 4,
                korean: "주거",
                english: "Housing",
                qa: [
                    {
                        type: "general",
                        q: "How is the structure of houses different from the past?",
                        a: "So, houses have changed a lot compared to the past. Back in the day, houses were pretty small and simple, right? There weren't that many rooms, and the spaces were basically just for sleeping and eating. And honestly, a lot of houses didn't even have proper heating or cooling systems. But now? Totally different. Houses are way more modern and functional. They're bigger, and every space has its own purpose — like you've got a living room, a separate kitchen, sometimes even a home office. And the biggest thing is probably technology. A lot of modern houses have smart devices now, like smart lighting or security systems, stuff that just makes life easier. People also care way more about comfort and design these days. So houses are built with better insulation, better lighting, and nicer interiors. I think it all comes down to technology getting better and people's living standards going up. Yeah, houses used to be really basic, but now they're all about comfort and convenience."
                    },
                    {

        let currentTopicId = 1;
        let currentSpeed = 0.95;
        let isPlayingAll = false;
        let currentPlayingIndex = -1;
        let synth = window.speechSynthesis;
        let currentUtterance = null;
        let selectedVoice = null;
        let availableVoices = [];
        let stopRequested = false;

        // Voice quality ranking - prefer natural/neural voices
        const VOICE_PRIORITY = [
            // Google neural voices (Chrome)
            'Google US English',
            'Google UK English Female',
            // Microsoft neural voices (Edge)
            'Microsoft Jenny Online',
            'Microsoft Aria Online',
            'Microsoft Jenny',
            'Microsoft Aria',
            'Microsoft Zira',
            // Apple voices (Safari)
            'Samantha',
            'Karen',
            'Moira',
            // Fallback patterns
            'Natural',
            'Neural',
            'Premium',
            'Enhanced',
        ];

        function getBestVoice() {
            const voices = synth.getVoices();
            availableVoices = voices.filter(v => v.lang.startsWith('en'));

            // Try priority list first
            for (const name of VOICE_PRIORITY) {
                const found = availableVoices.find(v => v.name.includes(name));
                if (found) return found;
            }

            // Try any female-sounding English voice
            const femalePatterns = ['female', 'Female', 'woman', 'Girl', 'Jenny', 'Aria', 'Zira', 'Samantha', 'Karen', 'Amy'];
            for (const pat of femalePatterns) {
                const found = availableVoices.find(v => v.name.includes(pat));
                if (found) return found;
            }

            // Fallback to first English voice
            return availableVoices[0] || voices[0] || null;
        }

        function populateVoiceSelector() {
            const selector = document.getElementById('voiceSelector');
            if (!selector) return;
            const voices = synth.getVoices().filter(v => v.lang.startsWith('en'));
            selector.innerHTML = voices.map((v, i) =>
                `<option value="${i}" ${v === selectedVoice ? 'selected' : ''}>${v.name} (${v.lang})</option>`
            ).join('');
            selector.onchange = () => {
                selectedVoice = voices[parseInt(selector.value)];
            };
        }

        // Split text into sentences for natural pauses
        function splitSentences(text) {
            // Split on sentence-ending punctuation followed by space
            return text.match(/[^.!?]+[.!?]+[\s]?/g) || [text];
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderSidebar();
            renderContent();
            setupEventListeners();

            // Load voices (may be async)
            function initVoices() {
                selectedVoice = getBestVoice();
                populateVoiceSelector();
            }
            initVoices();
            synth.onvoiceschanged = initVoices;

            // Check for saved theme preference
            try {
                const savedTheme = localStorage.getItem('theme') || 'light';
                if (savedTheme === 'dark') {
                    document.body.classList.add('dark-mode');
                    document.getElementById('themeToggle').textContent = '☀️';
                }
            } catch(e) {}
        });

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = topics.map(topic => `
                <div class="topic-tab ${topic.id === currentTopicId ? 'active' : ''}" data-id="${topic.id}">
                    <div class="topic-name">${topic.korean}</div>
                    <div class="topic-subtitle">${topic.english}</div>
                </div>
            `).join('');

            sidebar.querySelectorAll('.topic-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentTopicId = parseInt(tab.dataset.id);
                    renderSidebar();
                    renderContent();
                });
            });
        }

        function renderContent() {
            const content = document.getElementById('content');
            const topic = topics.find(t => t.id === currentTopicId);

            if (!topic) {
                content.innerHTML = '<div class="empty-state">Select a topic</div>';
                return;
            }

            content.innerHTML = topic.qa.map((qa, idx) => {
                let badgeClass = 'badge-general';
                let badgeText = 'General';

                if (qa.type === 'roleplay') {
                    badgeClass = 'badge-roleplay';
                    badgeText = '롤플레이';
                } else if (qa.type === 'sudden') {
                    badgeClass = 'badge-sudden';
                    badgeText = '돌발';
                } else if (qa.type === 'experience') {
                    badgeClass = 'badge-experience';
                    badgeText = '경험';
                }

                return `
                    <div class="question-block">
                        <div class="badge badge-${qa.type}">${badgeText}</div>
                        <div class="question">Q${idx + 1}: ${qa.q}</div>
                        <div class="answer-container">
                            <div class="answer-text" id="answer-${currentTopicId}-${idx}">
                                ${qa.a}
                            </div>
                            <div class="audio-controls">
                                <button class="btn-play" data-topic="${currentTopicId}" data-index="${idx}">
                                    <span>▶</span> Play
                                </button>
                                <button class="btn-play" style="background-color: #ef4444;" data-stop="${currentTopicId}-${idx}" title="Stop">
                                    <span>⏹</span> Stop
                                </button>
                            </div>
                            <div class="playback-info" id="info-${currentTopicId}-${idx}"></div>
                        </div>
                    </div>
                `;
            }).join('');

            // Add event listeners
            content.querySelectorAll('.btn-play[data-topic]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const topicId = parseInt(btn.dataset.topic);
                    const index = parseInt(btn.dataset.index);
                    playAnswer(topicId, index);
                });
            });

            content.querySelectorAll('[data-stop]').forEach(btn => {
                btn.addEventListener('click', () => {
                    stopRequested = true;
                    synth.cancel();
                    document.querySelectorAll('.playback-info').forEach(info => {
                        info.textContent = '';
                    });
                });
            });
        }

        function playAnswer(topicId, index) {
            synth.cancel();
            stopRequested = false;

            const topic = topics.find(t => t.id === topicId);
            const qa = topic.qa[index];
            const answerElement = document.getElementById(`answer-${topicId}-${index}`);
            const infoElement = document.getElementById(`info-${topicId}-${index}`);
            const fullText = qa.a;

            // Split into sentences for natural pauses
            const sentences = splitSentences(fullText);
            let sentenceIndex = 0;
            let spokenSoFar = '';

            function speakNextSentence() {
                if (stopRequested || sentenceIndex >= sentences.length) {
                    // Done with all sentences
                    infoElement.textContent = '';
                    answerElement.innerHTML = escapeHtml(fullText);
                    if (!stopRequested && isPlayingAll && currentTopicId === topicId) {
                        if (index < topic.qa.length - 1) {
                            setTimeout(() => playAnswer(topicId, index + 1), 800);
                        } else {
                            isPlayingAll = false;
                        }
                    }
                    return;
                }

                const sentence = sentences[sentenceIndex].trim();
                if (!sentence) { sentenceIndex++; speakNextSentence(); return; }

                const utterance = new SpeechSynthesisUtterance(sentence);

                // Apply selected voice
                if (selectedVoice) utterance.voice = selectedVoice;

                // Natural speech settings
                utterance.rate = currentSpeed;
                utterance.pitch = 1.0 + (Math.random() * 0.06 - 0.03); // Slight pitch variation
                utterance.volume = 1.0;

                // Highlight current sentence
                utterance.onstart = () => {
                    currentPlayingIndex = index;
                    const before = spokenSoFar;
                    const current = sentence;
                    const after = fullText.substring(before.length + current.length);
                    answerElement.innerHTML =
                        escapeHtml(before) +
                        '<span class="highlighted">' + escapeHtml(current) + '</span>' +
                        escapeHtml(after);
                    infoElement.textContent = 'Playing... (' + (sentenceIndex + 1) + '/' + sentences.length + ')';
                };

                // Word-level highlight within sentence
                utterance.onboundary = (event) => {
                    if (event.name === 'word') {
                        const before = spokenSoFar;
                        const currentHighlight = sentence.substring(0, event.charIndex + event.charLength);
                        const restOfSentence = sentence.substring(event.charIndex + event.charLength);
                        const after = fullText.substring(before.length + sentence.length);
                        answerElement.innerHTML =
                            escapeHtml(before) +
                            '<span class="highlighted">' + escapeHtml(currentHighlight) + '</span>' +
                            escapeHtml(restOfSentence) +
                            escapeHtml(after);
                    }
                };

                utterance.onend = () => {
                    spokenSoFar += sentences[sentenceIndex];
                    sentenceIndex++;
                    // Natural pause between sentences (200-400ms)
                    const pause = 250 + Math.random() * 150;
                    setTimeout(speakNextSentence, pause);
                };

                utterance.onerror = (e) => {
                    if (e.error !== 'canceled') {
                        infoElement.textContent = 'Error: ' + e.error;
                    }
                };

                synth.speak(utterance);
            }

            speakNextSentence();
        }

        function updateHighlight(element, upToText) {
            const fullText = element.textContent;
            element.innerHTML = `
                <span class="highlighted">${escapeHtml(upToText)}</span>${escapeHtml(fullText.substring(upToText.length))}
            `;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function setupEventListeners() {
            // Play All
            document.getElementById('playAllBtn').addEventListener('click', () => {
                isPlayingAll = true;
                synth.cancel();
                const topic = topics.find(t => t.id === currentTopicId);
                if (topic && topic.qa.length > 0) {
                    playAnswer(currentTopicId, 0);
                }
            });

            // Stop All
            document.getElementById('stopAllBtn').addEventListener('click', () => {
                isPlayingAll = false;
                stopRequested = true;
                synth.cancel();
                document.querySelectorAll('.playback-info').forEach(info => {
                    info.textContent = '';
                });
            });

            // Speed controls
            document.querySelectorAll('.speed-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSpeed = parseFloat(btn.dataset.speed);
                });
            });

            // Theme toggle
            document.getElementById('themeToggle').addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                this.textContent = isDark ? '☀️' : '🌙';
            });
        }

        // Chrome bug workaround: keep synth alive for long texts
        setInterval(() => { if (synth.speaking) synth.resume(); }, 10000);
    </script>
