<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPIc Script Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --accent-color: #ec4899;
            --bg-light: #ffffff;
            --bg-dark: #1f2937;
            --text-light: #111827;
            --text-dark: #f3f4f6;
            --border-light: #e5e7eb;
            --border-dark: #374151;
            --highlight-color: #fef08a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-light);
            transition: background-color 0.3s, color 0.3s;
            height: 100vh;
            overflow: hidden;
        }

        body.dark-mode {
            background-color: var(--bg-dark);
            color: var(--text-dark);
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .global-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-primary:hover {
            background-color: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .btn-primary.active {
            background-color: rgba(255, 255, 255, 0.4);
            border-color: white;
        }

        .speed-control {
            display: flex;
            gap: 0.3rem;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 0.3rem;
            border-radius: 0.5rem;
        }

        .speed-btn {
            padding: 0.5rem 0.8rem;
            background-color: transparent;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 0.3rem;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .speed-btn.active {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .speed-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .theme-toggle {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background-color: var(--bg-light);
            border-right: 1px solid var(--border-light);
            overflow-y: auto;
            transition: background-color 0.3s;
        }

        body.dark-mode .sidebar {
            background-color: #111827;
            border-right-color: var(--border-dark);
        }

        .topic-tab {
            padding: 1.2rem;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.3s ease;
            border-bottom: 1px solid var(--border-light);
        }

        body.dark-mode .topic-tab {
            border-bottom-color: var(--border-dark);
        }

        .topic-tab:hover {
            background-color: #f3f4f6;
        }

        body.dark-mode .topic-tab:hover {
            background-color: #1f2937;
        }

        .topic-tab.active {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.1) 0%, transparent 100%);
            border-left-color: var(--primary-color);
        }

        body.dark-mode .topic-tab.active {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.2) 0%, transparent 100%);
        }

        .topic-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
            color: var(--text-light);
        }

        body.dark-mode .topic-name {
            color: var(--text-dark);
        }

        .topic-subtitle {
            font-size: 0.8rem;
            color: #6b7280;
        }

        body.dark-mode .topic-subtitle {
            color: #9ca3af;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            background-color: var(--bg-light);
            transition: background-color 0.3s;
        }

        body.dark-mode .content {
            background-color: #111827;
        }

        .question-block {
            margin-bottom: 2.5rem;
            background-color: #f9fafb;
            padding: 1.5rem;
            border-radius: 0.8rem;
            border-left: 4px solid var(--primary-color);
            transition: background-color 0.3s;
        }

        body.dark-mode .question-block {
            background-color: #1f2937;
        }

        .badge {
            display: inline-block;
            padding: 0.3rem 0.7rem;
            border-radius: 0.3rem;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-roleplay {
            background-color: #dbeafe;
            color: #1e40af;
        }

        body.dark-mode .badge-roleplay {
            background-color: #1e3a8a;
            color: #93c5fd;
        }

        .badge-sudden {
            background-color: #fed7aa;
            color: #92400e;
        }

        body.dark-mode .badge-sudden {
            background-color: #78350f;
            color: #fdba74;
        }

        .badge-experience {
            background-color: #dcfce7;
            color: #15803d;
        }

        body.dark-mode .badge-experience {
            background-color: #064e3b;
            color: #86efac;
        }

        .badge-general {
            background-color: #e5e7eb;
            color: #374151;
        }

        body.dark-mode .badge-general {
            background-color: #4b5563;
            color: #d1d5db;
        }

        .question {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--text-light);
        }

        body.dark-mode .question {
            color: var(--text-dark);
        }

        .answer-container {
            background-color: var(--bg-light);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            transition: background-color 0.3s;
        }

        body.dark-mode .answer-container {
            background-color: #374151;
        }

        .answer-text {
            line-height: 1.8;
            color: #374151;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        body.dark-mode .answer-text {
            color: #d1d5db;
        }

        .answer-text .highlighted {
            background-color: var(--highlight-color);
            padding: 0.2rem 0.4rem;
            border-radius: 0.2rem;
            font-weight: 600;
        }

        .audio-controls {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .btn-play {
            background-color: var(--primary-color);
            color: white;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-play:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-play:active {
            transform: translateY(0);
        }

        .playback-info {
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 0.5rem;
        }

        body.dark-mode .playback-info {
            color: #9ca3af;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #9ca3af;
            font-size: 1.1rem;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        body.dark-mode ::-webkit-scrollbar-thumb {
            background: #4b5563;
        }

        body.dark-mode ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .main-content {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 200px;
                border-right: none;
                border-bottom: 1px solid var(--border-light);
                display: flex;
                overflow-x: auto;
            }

            body.dark-mode .sidebar {
                border-bottom-color: var(--border-dark);
            }

            .topic-tab {
                flex-shrink: 0;
                border-left: none;
                border-bottom: 4px solid transparent;
                width: auto;
                min-width: 200px;
            }

            .topic-tab.active {
                border-left: none;
                border-bottom-color: var(--primary-color);
            }

            .content {
                padding: 1rem;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header h1 {
                font-size: 1.4rem;
            }

            .global-controls {
                width: 100%;
                justify-content: space-between;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.2rem;
            }

            .btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.85rem;
            }

            .question-block {
                padding: 1rem;
                border-left-width: 3px;
            }

            .question {
                font-size: 1rem;
            }

            .answer-text {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 OPIc Script Viewer</h1>
            <div class="global-controls">
                <button class="btn btn-primary" id="playAllBtn">
                    <span>▶</span> Play All
                </button>
                <button class="btn btn-primary" id="stopAllBtn">
                    <span>⏹</span> Stop
                </button>
                <div class="speed-control" id="speedControl">
                    <button class="speed-btn" data-speed="0.7">0.7x</button>
                    <button class="speed-btn" data-speed="0.8">0.8x</button>
                    <button class="speed-btn active" data-speed="0.9">0.9x</button>
                    <button class="speed-btn" data-speed="1.0">1.0x</button>
                    <button class="speed-btn" data-speed="1.1">1.1x</button>
                    <button class="speed-btn" data-speed="1.2">1.2x</button>
                </div>
                <select id="voiceSelector" style="padding:0.5rem;border-radius:0.4rem;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15);color:white;font-size:0.85rem;max-width:200px;cursor:pointer;" title="Select Voice">
                    <option>Loading voices...</option>
                </select>
                <button class="btn theme-toggle" id="themeToggle">🌙</button>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar" id="sidebar"></div>
            <div class="content" id="content"></div>
        </div>
    </div>

    <script>
        // Data structure
        const topics = [

            {

                korean: "시간 관리",
                english: "Time Management",

        let currentTopicId = 1;
        let currentSpeed = 0.95;
        let isPlayingAll = false;
        let currentPlayingIndex = -1;
        let synth = window.speechSynthesis;
        let currentUtterance = null;
        let selectedVoice = null;
        let availableVoices = [];
        let stopRequested = false;

        // Voice quality ranking - prefer natural/neural voices (conversational tone)
        const VOICE_PRIORITY = [
            // Apple premium conversational voices (Safari/macOS)
            'Samantha (Enhanced)',
            'Samantha (Premium)',
            'Ava (Premium)',
            'Zoe (Premium)',
            'Allison (Premium)',
            // Google neural voices (Chrome)
            'Google US English',
            'Google UK English Female',
            // Microsoft neural conversational voices (Edge)
            'Microsoft Jenny Online (Natural)',
            'Microsoft Aria Online (Natural)',
            'Microsoft Jenny Online',
            'Microsoft Aria Online',
            'Microsoft Jenny',
            'Microsoft Aria',
            'Microsoft Zira',
            // Apple standard voices
            'Samantha',
            'Karen',
            'Moira',
            'Ava',
            'Allison',
            // Fallback patterns - prefer natural/conversational
            'Natural',
            'Neural',
            'Premium',
            'Enhanced',
        ];

        function getBestVoice() {
            const voices = synth.getVoices();
            availableVoices = voices.filter(v => v.lang.startsWith('en'));

            // Try priority list first
            for (const name of VOICE_PRIORITY) {
                const found = availableVoices.find(v => v.name.includes(name));
                if (found) return found;
            }

            // Try any female-sounding English voice
            const femalePatterns = ['female', 'Female', 'woman', 'Girl', 'Jenny', 'Aria', 'Zira', 'Samantha', 'Karen', 'Amy', 'Ava', 'Allison'];
            for (const pat of femalePatterns) {
                const found = availableVoices.find(v => v.name.includes(pat));
                if (found) return found;
            }

            // Fallback to first English voice
            return availableVoices[0] || voices[0] || null;
        }

        function populateVoiceSelector() {
            const selector = document.getElementById('voiceSelector');
            if (!selector) return;
            const voices = synth.getVoices().filter(v => v.lang.startsWith('en'));
            selector.innerHTML = voices.map((v, i) =>
                `<option value="${i}" ${v === selectedVoice ? 'selected' : ''}>${v.name} (${v.lang})</option>`
            ).join('');
            selector.onchange = () => {
                selectedVoice = voices[parseInt(selector.value)];
            };
        }

        // ---- Conversational Speech Engine ----

        // Detect sentence type for intonation
        function getSentenceType(text) {
            const trimmed = text.trim();
            if (trimmed.endsWith('?')) return 'question';
            if (trimmed.endsWith('!')) return 'exclamation';
            // Detect conversational openers
            const openers = /^(well|so|oh|hi|hey|hmm|alright|okay|actually|honestly|basically|i mean|you know|let me|i think|i'd like)/i;
            if (openers.test(trimmed)) return 'conversational';
            return 'statement';
        }

        // Get pitch based on sentence type (creates natural intonation)
        function getPitch(sentenceType, position, totalChunks) {
            const base = 1.05; // Slightly higher base for livelier tone
            switch (sentenceType) {
                case 'question':
                    // Rising intonation for questions
                    return base + 0.08 + (Math.random() * 0.06);
                case 'exclamation':
                    // Higher energy, varied pitch
                    return base + 0.05 + (Math.random() * 0.08);
                case 'conversational':
                    // Natural, slightly relaxed tone
                    return base - 0.02 + (Math.random() * 0.08);
                default:
                    // Statements: gentle falling contour with variation
                    const progress = position / Math.max(totalChunks, 1);
                    return base + 0.02 - (progress * 0.04) + (Math.random() * 0.06 - 0.03);
            }
        }

        // Get rate variation for natural rhythm
        function getRate(baseRate, sentenceType, textLength) {
            let modifier = 1.0;
            // Questions are slightly slower (thinking/asking)
            if (sentenceType === 'question') modifier = 0.95;
            // Exclamations slightly faster (energy)
            else if (sentenceType === 'exclamation') modifier = 1.02;
            // Conversational openers slightly slower (casual)
            else if (sentenceType === 'conversational') modifier = 0.97;
            // Long sentences slightly faster to feel natural
            if (textLength > 120) modifier *= 1.03;
            // Short phrases slightly slower for emphasis
            if (textLength < 30) modifier *= 0.96;
            // Add tiny random variation for liveliness (±2%)
            modifier *= (0.98 + Math.random() * 0.04);
            return baseRate * modifier;
        }

        // Get pause duration based on context
        function getPause(chunk, nextChunk) {
            const trimmed = chunk.trim();
            // Longer pause after questions (thinking time)
            if (trimmed.endsWith('?')) return 450 + Math.random() * 200;
            // Medium-long pause after exclamations
            if (trimmed.endsWith('!')) return 350 + Math.random() * 150;
            // Standard pause after periods
            if (trimmed.endsWith('.')) return 300 + Math.random() * 200;
            // Short pause after commas/semicolons (phrase break)
            if (trimmed.endsWith(',') || trimmed.endsWith(';') || trimmed.endsWith(':')) {
                return 150 + Math.random() * 100;
            }
            // Phrase break (split at conjunction)
            return 120 + Math.random() * 80;
        }

        // Split text into natural speech chunks (phrases, not just sentences)
        function splitIntoChunks(text) {
            const chunks = [];
            // First split into sentences
            const sentences = text.match(/[^.!?]+[.!?]+[\s]?/g) || [text];

            for (const sentence of sentences) {
                const trimmed = sentence.trim();
                if (!trimmed) continue;

                // For longer sentences, split at natural phrase boundaries
                if (trimmed.length > 80) {
                    // Split at commas, semicolons, and conjunctions that create natural pauses
                    const phrases = trimmed.match(/[^,;]+(?:,|;|$)/g);
                    if (phrases && phrases.length > 1) {
                        phrases.forEach((phrase, i) => {
                            const p = phrase.trim();
                            if (p) {
                                // Keep the sentence-ending punctuation with the last phrase
                                chunks.push({ text: p, isFinal: i === phrases.length - 1 });
                            }
                        });
                    } else {
                        chunks.push({ text: trimmed, isFinal: true });
                    }
                } else {
                    chunks.push({ text: trimmed, isFinal: true });
                }
            }
            return chunks;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderSidebar();
            renderContent();
            setupEventListeners();

            // Load voices (may be async)
            function initVoices() {
                selectedVoice = getBestVoice();
                populateVoiceSelector();
            }
            initVoices();
            synth.onvoiceschanged = initVoices;

            // Check for saved theme preference
            try {
                const savedTheme = localStorage.getItem('theme') || 'light';
                if (savedTheme === 'dark') {
                    document.body.classList.add('dark-mode');
                    document.getElementById('themeToggle').textContent = '☀️';
                }
            } catch(e) {}
        });

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = topics.map(topic => `
                <div class="topic-tab ${topic.id === currentTopicId ? 'active' : ''}" data-id="${topic.id}">
                    <div class="topic-name">${topic.korean}</div>
                    <div class="topic-subtitle">${topic.english}</div>
                </div>
            `).join('');

            sidebar.querySelectorAll('.topic-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentTopicId = parseInt(tab.dataset.id);
                    renderSidebar();
                    renderContent();
                });
            });
        }

        function renderContent() {
            const content = document.getElementById('content');
            const topic = topics.find(t => t.id === currentTopicId);

            if (!topic) {
                content.innerHTML = '<div class="empty-state">Select a topic</div>';
                return;
            }

            content.innerHTML = topic.qa.map((qa, idx) => {
                let badgeClass = 'badge-general';
                let badgeText = 'General';
                
                if (qa.type === 'roleplay') {
                    badgeClass = 'badge-roleplay';
                    badgeText = '롤플레이';
                } else if (qa.type === 'sudden') {
                    badgeClass = 'badge-sudden';
                    badgeText = '돌발';
                } else if (qa.type === 'experience') {
                    badgeClass = 'badge-experience';
                    badgeText = '경험';
                }

                return `
                    <div class="question-block">
                        <div class="badge badge-${qa.type}">${badgeText}</div>
                        <div class="question">Q${idx + 1}: ${qa.q}</div>
                        <div class="answer-container">
                            <div class="answer-text" id="answer-${currentTopicId}-${idx}">
                                ${qa.a}
                            </div>
                            <div class="audio-controls">
                                <button class="btn-play" data-topic="${currentTopicId}" data-index="${idx}">
                                    <span>▶</span> Play
                                </button>
                                <button class="btn-play" style="background-color: #ef4444;" data-stop="${currentTopicId}-${idx}" title="Stop">
                                    <span>⏹</span> Stop
                                </button>
                            </div>
                            <div class="playback-info" id="info-${currentTopicId}-${idx}"></div>
                        </div>
                    </div>
                `;
            }).join('');

            // Add event listeners
            content.querySelectorAll('.btn-play[data-topic]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const topicId = parseInt(btn.dataset.topic);
                    const index = parseInt(btn.dataset.index);
                    playAnswer(topicId, index);
                });
            });

            content.querySelectorAll('[data-stop]').forEach(btn => {
                btn.addEventListener('click', () => {
                    stopRequested = true;
                    synth.cancel();
                    document.querySelectorAll('.playback-info').forEach(info => {
                        info.textContent = '';
                    });
                });
            });
        }

        function playAnswer(topicId, index) {
            synth.cancel();
            stopRequested = false;

            const topic = topics.find(t => t.id === topicId);
            const qa = topic.qa[index];
            const answerElement = document.getElementById(`answer-${topicId}-${index}`);
            const infoElement = document.getElementById(`info-${topicId}-${index}`);
            const fullText = qa.a;

            // Split into natural speech chunks (phrases + sentences)
            const chunks = splitIntoChunks(fullText);
            let chunkIndex = 0;
            let spokenSoFar = '';

            function speakNextChunk() {
                if (stopRequested || chunkIndex >= chunks.length) {
                    // Done with all chunks
                    infoElement.textContent = '';
                    answerElement.innerHTML = escapeHtml(fullText);
                    if (!stopRequested && isPlayingAll && currentTopicId === topicId) {
                        if (index < topic.qa.length - 1) {
                            setTimeout(() => playAnswer(topicId, index + 1), 800);
                        } else {
                            isPlayingAll = false;
                        }
                    }
                    return;
                }

                const chunk = chunks[chunkIndex];
                const chunkText = chunk.text.trim();
                if (!chunkText) { chunkIndex++; speakNextChunk(); return; }

                const utterance = new SpeechSynthesisUtterance(chunkText);

                // Apply selected voice
                if (selectedVoice) utterance.voice = selectedVoice;

                // Conversational speech settings
                const sentenceType = getSentenceType(chunkText);
                utterance.rate = getRate(currentSpeed, sentenceType, chunkText.length);
                utterance.pitch = getPitch(sentenceType, chunkIndex, chunks.length);
                utterance.volume = 1.0;

                // Highlight current chunk
                utterance.onstart = () => {
                    currentPlayingIndex = index;
                    const before = spokenSoFar;
                    const current = chunkText;
                    const afterPos = fullText.indexOf(current, before.length);
                    const actualAfterStart = afterPos >= 0 ? afterPos + current.length : before.length + current.length;
                    const after = fullText.substring(actualAfterStart);
                    answerElement.innerHTML =
                        escapeHtml(before) +
                        '<span class="highlighted">' + escapeHtml(current) + '</span>' +
                        escapeHtml(after);
                    infoElement.textContent = 'Playing... (' + (chunkIndex + 1) + '/' + chunks.length + ')';
                };

                // Word-level highlight within chunk
                utterance.onboundary = (event) => {
                    if (event.name === 'word') {
                        const before = spokenSoFar;
                        const currentHighlight = chunkText.substring(0, event.charIndex + event.charLength);
                        const restOfChunk = chunkText.substring(event.charIndex + event.charLength);
                        const afterPos = fullText.indexOf(chunkText, before.length);
                        const actualAfterStart = afterPos >= 0 ? afterPos + chunkText.length : before.length + chunkText.length;
                        const after = fullText.substring(actualAfterStart);
                        answerElement.innerHTML =
                            escapeHtml(before) +
                            '<span class="highlighted">' + escapeHtml(currentHighlight) + '</span>' +
                            escapeHtml(restOfChunk) +
                            escapeHtml(after);
                    }
                };

                utterance.onend = () => {
                    // Track spoken position in original text
                    const pos = fullText.indexOf(chunkText, spokenSoFar.length);
                    if (pos >= 0) {
                        spokenSoFar = fullText.substring(0, pos + chunkText.length);
                        // Include trailing space/comma if present
                        while (spokenSoFar.length < fullText.length && fullText[spokenSoFar.length] === ' ') {
                            spokenSoFar += ' ';
                        }
                    } else {
                        spokenSoFar += chunkText + ' ';
                    }

                    const nextChunk = chunkIndex + 1 < chunks.length ? chunks[chunkIndex + 1] : null;
                    chunkIndex++;

                    // Context-aware pause duration
                    const pause = getPause(chunkText, nextChunk ? nextChunk.text : null);
                    setTimeout(speakNextChunk, pause);
                };

                utterance.onerror = (e) => {
                    if (e.error !== 'canceled') {
                        infoElement.textContent = 'Error: ' + e.error;
                    }
                };

                synth.speak(utterance);
            }

            speakNextChunk();
        }

        function updateHighlight(element, upToText) {
            const fullText = element.textContent;
            element.innerHTML = `
                <span class="highlighted">${escapeHtml(upToText)}</span>${escapeHtml(fullText.substring(upToText.length))}
            `;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function setupEventListeners() {
            // Play All
            document.getElementById('playAllBtn').addEventListener('click', () => {
                isPlayingAll = true;
                synth.cancel();
                const topic = topics.find(t => t.id === currentTopicId);
                if (topic && topic.qa.length > 0) {
                    playAnswer(currentTopicId, 0);
                }
            });

            // Stop All
            document.getElementById('stopAllBtn').addEventListener('click', () => {
                isPlayingAll = false;
                stopRequested = true;
                synth.cancel();
                document.querySelectorAll('.playback-info').forEach(info => {
                    info.textContent = '';
                });
            });

            // Speed controls
            document.querySelectorAll('.speed-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSpeed = parseFloat(btn.dataset.speed);
                });
            });

            // Theme toggle
            document.getElementById('themeToggle').addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                this.textContent = isDark ? '☀️' : '🌙';
            });
        }

        // Chrome bug workaround: keep synth alive for long texts
        setInterval(() => { if (synth.speaking) synth.resume(); }, 10000);
    </script>
